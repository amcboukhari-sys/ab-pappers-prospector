name: Pappers Prospector — Daily Import

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run-prospector:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install requests

      - name: Lancer le Pappers Prospector
        env:
          PAPPERS_API_KEY:  ${{ secrets.PAPPERS_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID:    ${{ secrets.SLACK_USER_ID }}
        run: |
          python pappers_prospector.py
          mkdir -p csv_backup
          cp /tmp/pappers_prospects_*.csv csv_backup/ 2>/dev/null || true

      - name: Sauvegarder CSV backup
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pappers-csv-${{ github.run_number }}
          path: csv_backup/
          retention-days: 90
