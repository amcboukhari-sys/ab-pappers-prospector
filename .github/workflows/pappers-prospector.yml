name: Pappers Prospector — Daily Import

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run-prospector:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install requests google-api-python-client google-auth

      - name: Lancer le Pappers Prospector
        env:
          PAPPERS_API_KEY:    ${{ secrets.PAPPERS_API_KEY }}
          AIRTABLE_API_KEY:   ${{ secrets.AIRTABLE_API_KEY }}
          SLACK_BOT_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID:      ${{ secrets.SLACK_USER_ID }}
          GDRIVE_FOLDER_ID:   ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SA_JSON_B64: ${{ secrets.GDRIVE_SA_JSON_B64 }}
        run: python pappers_prospector.py
